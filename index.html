<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collexis — Coming Soon</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Subtle background gradient blob */
    body::before {
      content: '';
      position: fixed;
      top: -20%;
      right: -10%;
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, rgba(100, 210, 190, 0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -20%;
      left: -10%;
      width: 50vw;
      height: 50vw;
      background: radial-gradient(circle, rgba(60, 180, 200, 0.10) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      text-align: center;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    .logo {
      font-size: clamp(2.8rem, 8vw, 5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #2abfaa 0%, #1e9bb8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }

    .badge {
      display: inline-block;
      background: linear-gradient(135deg, rgba(42, 191, 170, 0.12), rgba(30, 155, 184, 0.12));
      border: 1px solid rgba(42, 191, 170, 0.3);
      color: #1e9bb8;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.45rem 1.1rem;
      border-radius: 100px;
      margin-bottom: 0;
    }

    .footer {
      position: fixed;
      bottom: 2rem;
      font-size: 0.8rem;
      color: #bbb;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">Coming Soon</div>
    <div class="logo">Collexis</div>
  </div>

  <p class="footer">&copy; 2026 Collexis</p>

</body>
</html>
